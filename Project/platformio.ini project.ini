[env:esp32dev]
platform = espressif32@6.4.0
board = esp32dev
framework = arduino
board_build.mcu = esp32
board_build.f_cpu = 240000000L
upload_speed = 460800
monitor_speed = 115200
build_flags = 
    -I src
    -I include
lib_deps = 
  adafruit/DHT sensor library
  adafruit/Adafruit Unified Sensor